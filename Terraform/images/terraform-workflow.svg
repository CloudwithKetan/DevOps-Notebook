<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="400" fill="#0d1117" rx="12"/>
  <text x="430" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#7c3aed">🏗️ Terraform Workflow</text>

  <!-- Write -->
  <rect x="30" y="60" width="160" height="200" rx="10" fill="#161b22" stroke="#7c3aed" stroke-width="2"/>
  <rect x="30" y="60" width="160" height="32" rx="10" fill="#2d1b69"/>
  <rect x="30" y="82" width="160" height="10" fill="#2d1b69"/>
  <text x="110" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#d2a8ff">WRITE</text>
  <text x="110" y="115" text-anchor="middle" font-size="28">📝</text>
  <text x="110" y="148" text-anchor="middle" font-size="11" fill="#e6edf3">Define infrastructure</text>
  <text x="110" y="168" text-anchor="middle" font-size="11" fill="#e6edf3">in .tf files</text>
  <line x1="45" y1="182" x2="175" y2="182" stroke="#30363d" stroke-width="1"/>
  <text x="110" y="200" text-anchor="middle" font-size="10" fill="#8b949e">main.tf</text>
  <text x="110" y="217" text-anchor="middle" font-size="10" fill="#8b949e">variables.tf</text>
  <text x="110" y="234" text-anchor="middle" font-size="10" fill="#8b949e">outputs.tf</text>

  <!-- Arrow W→I -->
  <line x1="193" y1="160" x2="225" y2="160" stroke="#d2a8ff" stroke-width="2" marker-end="url(#ta)"/>
  <text x="209" y="152" text-anchor="middle" font-size="9" fill="#8b949e">init</text>

  <!-- Init -->
  <rect x="228" y="100" width="130" height="80" rx="8" fill="#1f1535" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="293" y="124" text-anchor="middle" font-size="22">⬇️</text>
  <text x="293" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#d2a8ff">terraform init</text>
  <text x="293" y="165" text-anchor="middle" font-size="10" fill="#8b949e">Download providers</text>
  <text x="293" y="178" text-anchor="middle" font-size="10" fill="#8b949e">& modules</text>

  <!-- Arrow I→P -->
  <line x1="361" y1="140" x2="395" y2="140" stroke="#3fb950" stroke-width="2" marker-end="url(#taG)"/>

  <!-- Plan -->
  <rect x="398" y="60" width="160" height="200" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <rect x="398" y="60" width="160" height="32" rx="10" fill="#1a2f1a"/>
  <rect x="398" y="82" width="160" height="10" fill="#1a2f1a"/>
  <text x="478" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#3fb950">PLAN</text>
  <text x="478" y="115" text-anchor="middle" font-size="28">🔍</text>
  <text x="478" y="148" text-anchor="middle" font-size="11" fill="#e6edf3">Preview changes</text>
  <text x="478" y="168" text-anchor="middle" font-size="11" fill="#e6edf3">before applying</text>
  <line x1="413" y1="182" x2="543" y2="182" stroke="#30363d" stroke-width="1"/>
  <text x="478" y="200" text-anchor="middle" font-size="10" fill="#3fb950">+ will create</text>
  <text x="478" y="217" text-anchor="middle" font-size="10" fill="#ffa657">~ will update</text>
  <text x="478" y="234" text-anchor="middle" font-size="10" fill="#f78166">- will destroy</text>

  <!-- Arrow P→A -->
  <line x1="561" y1="160" x2="595" y2="160" stroke="#ffa657" stroke-width="2" marker-end="url(#taO)"/>
  <text x="578" y="152" text-anchor="middle" font-size="9" fill="#ffa657">approve</text>

  <!-- Apply -->
  <rect x="598" y="60" width="160" height="200" rx="10" fill="#161b22" stroke="#ffa657" stroke-width="2"/>
  <rect x="598" y="60" width="160" height="32" rx="10" fill="#2d1f0d"/>
  <rect x="598" y="82" width="160" height="10" fill="#2d1f0d"/>
  <text x="678" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffa657">APPLY</text>
  <text x="678" y="115" text-anchor="middle" font-size="28">⚡</text>
  <text x="678" y="148" text-anchor="middle" font-size="11" fill="#e6edf3">Execute the plan</text>
  <text x="678" y="168" text-anchor="middle" font-size="11" fill="#e6edf3">Call cloud APIs</text>
  <line x1="613" y1="182" x2="743" y2="182" stroke="#30363d" stroke-width="1"/>
  <text x="678" y="200" text-anchor="middle" font-size="10" fill="#8b949e">Creates EC2, VPC</text>
  <text x="678" y="217" text-anchor="middle" font-size="10" fill="#8b949e">Updates state</text>
  <text x="678" y="234" text-anchor="middle" font-size="10" fill="#8b949e">Saves .tfstate</text>

  <!-- State box -->
  <rect x="228" y="285" width="530" height="90" rx="10" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="493" y="307" text-anchor="middle" font-size="13" font-weight="bold" fill="#58a6ff">🗄️ State File (terraform.tfstate)</text>
  <text x="493" y="327" text-anchor="middle" font-size="11" fill="#e6edf3">Records every resource Terraform manages. Stored locally or remotely (S3 + DynamoDB lock).</text>
  <text x="493" y="347" text-anchor="middle" font-size="10" fill="#8b949e">Plan reads state → compares with .tf files → computes diff → Apply executes diff → updates state</text>
  <text x="493" y="365" text-anchor="middle" font-size="10" fill="#ffa657">⚠️ Never manually edit this file. Use remote backend for teams.</text>

  <!-- Arrow Apply → State -->
  <line x1="678" y1="262" x2="678" y2="283" stroke="#ffa657" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#taO)"/>

  <!-- Arrow Plan → State (reads) -->
  <line x1="478" y1="262" x2="478" y2="283" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#taG)"/>

  <!-- Write back arrow -->
  <path d="M 190 260 Q 190 290 228 290" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ta)"/>
  <text x="178" y="285" font-size="9" fill="#8b949e" text-anchor="middle">iterate</text>

  <defs>
    <marker id="ta" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#d2a8ff"/></marker>
    <marker id="taG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/></marker>
    <marker id="taO" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ffa657"/></marker>
  </defs>
</svg>
