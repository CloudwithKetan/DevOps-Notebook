<svg viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="860" height="500" fill="#0d1117" rx="12"/>
  <text x="430" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#58a6ff">🐳 Docker Architecture</text>

  <!-- Developer box -->
  <rect x="30" y="70" width="130" height="80" rx="8" fill="#1f2d3d" stroke="#388bfd" stroke-width="1.5"/>
  <text x="95" y="105" text-anchor="middle" font-size="22">💻</text>
  <text x="95" y="125" text-anchor="middle" font-size="13" fill="#e6edf3">Developer</text>
  <text x="95" y="142" text-anchor="middle" font-size="11" fill="#8b949e">docker CLI</text>

  <!-- Arrow: Dev → Daemon -->
  <line x1="162" y1="110" x2="218" y2="110" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="190" y="104" text-anchor="middle" font-size="10" fill="#8b949e">REST API</text>

  <!-- Docker Daemon box -->
  <rect x="220" y="60" width="160" height="100" rx="8" fill="#1f2d3d" stroke="#388bfd" stroke-width="2"/>
  <text x="300" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#58a6ff">Docker Daemon</text>
  <text x="300" y="106" text-anchor="middle" font-size="11" fill="#8b949e">dockerd</text>
  <line x1="240" y1="115" x2="360" y2="115" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="132" text-anchor="middle" font-size="11" fill="#e6edf3">Manages all objects:</text>
  <text x="300" y="148" text-anchor="middle" font-size="10" fill="#8b949e">images · containers · networks</text>

  <!-- Arrow: Daemon → Registry -->
  <line x1="380" y1="95" x2="450" y2="95" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="415" y="88" text-anchor="middle" font-size="10" fill="#3fb950">pull/push</text>

  <!-- Registry -->
  <rect x="452" y="60" width="160" height="70" rx="8" fill="#1f2d3d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="532" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#3fb950">Registry</text>
  <text x="532" y="106" text-anchor="middle" font-size="11" fill="#8b949e">Docker Hub / ECR</text>
  <text x="532" y="122" text-anchor="middle" font-size="10" fill="#8b949e">Stores images</text>

  <!-- Arrow: Daemon → containerd -->
  <line x1="300" y1="160" x2="300" y2="210" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- containerd -->
  <rect x="220" y="212" width="160" height="60" rx="8" fill="#21262d" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="300" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#d2a8ff">containerd</text>
  <text x="300" y="258" text-anchor="middle" font-size="10" fill="#8b949e">Container runtime</text>

  <!-- Arrow containerd → runc -->
  <line x1="300" y1="272" x2="300" y2="310" stroke="#ffa657" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- runc -->
  <rect x="240" y="312" width="120" height="45" rx="8" fill="#21262d" stroke="#ffa657" stroke-width="1.5"/>
  <text x="300" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffa657">runc</text>
  <text x="300" y="350" text-anchor="middle" font-size="10" fill="#8b949e">OCI runtime</text>

  <!-- Host OS / Kernel bar -->
  <rect x="30" y="380" width="800" height="50" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="430" y="400" text-anchor="middle" font-size="13" font-weight="bold" fill="#e6edf3">Linux Kernel (Host OS)</text>
  <text x="430" y="420" text-anchor="middle" font-size="11" fill="#8b949e">Namespaces · Cgroups · Network stack</text>

  <!-- Containers row -->
  <text x="530" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#e6edf3">Running Containers</text>

  <!-- Container 1 -->
  <rect x="460" y="215" width="110" height="75" rx="8" fill="#0d419d" stroke="#388bfd" stroke-width="1.5"/>
  <text x="515" y="238" text-anchor="middle" font-size="20">📦</text>
  <text x="515" y="258" text-anchor="middle" font-size="11" fill="#e6edf3">web-app</text>
  <text x="515" y="272" text-anchor="middle" font-size="10" fill="#8b949e">nginx:1.25</text>
  <text x="515" y="284" text-anchor="middle" font-size="10" fill="#58a6ff">:8080→:80</text>

  <!-- Container 2 -->
  <rect x="580" y="215" width="110" height="75" rx="8" fill="#0d419d" stroke="#388bfd" stroke-width="1.5"/>
  <text x="635" y="238" text-anchor="middle" font-size="20">📦</text>
  <text x="635" y="258" text-anchor="middle" font-size="11" fill="#e6edf3">database</text>
  <text x="635" y="272" text-anchor="middle" font-size="10" fill="#8b949e">postgres:15</text>
  <text x="635" y="284" text-anchor="middle" font-size="10" fill="#58a6ff">:5432</text>

  <!-- Container 3 -->
  <rect x="700" y="215" width="110" height="75" rx="8" fill="#0d419d" stroke="#388bfd" stroke-width="1.5"/>
  <text x="755" y="238" text-anchor="middle" font-size="20">📦</text>
  <text x="755" y="258" text-anchor="middle" font-size="11" fill="#e6edf3">redis-cache</text>
  <text x="755" y="272" text-anchor="middle" font-size="10" fill="#8b949e">redis:7</text>
  <text x="755" y="284" text-anchor="middle" font-size="10" fill="#58a6ff">:6379</text>

  <!-- Arrows: containers → kernel -->
  <line x1="515" y1="290" x2="515" y2="378" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="635" y1="290" x2="635" y2="378" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="755" y1="290" x2="755" y2="378" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Image layers section -->
  <rect x="30" y="210" width="180" height="160" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="120" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#e6edf3">Image Layers</text>
  <text x="120" y="248" text-anchor="middle" font-size="10" fill="#8b949e">(Read-only, cached)</text>

  <rect x="45" y="255" width="150" height="22" rx="4" fill="#0d419d"/>
  <text x="120" y="270" text-anchor="middle" font-size="10" fill="#58a6ff">APP CODE layer</text>
  <rect x="45" y="280" width="150" height="22" rx="4" fill="#1b3a6b"/>
  <text x="120" y="295" text-anchor="middle" font-size="10" fill="#79c0ff">DEPENDENCIES layer</text>
  <rect x="45" y="305" width="150" height="22" rx="4" fill="#132b50"/>
  <text x="120" y="320" text-anchor="middle" font-size="10" fill="#388bfd">OS BASE layer (ubuntu)</text>
  <!-- Writable layer -->
  <rect x="45" y="330" width="150" height="22" rx="4" fill="#2d4739" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="120" y="345" text-anchor="middle" font-size="10" fill="#3fb950">Container layer (R/W)</text>
  <text x="120" y="363" text-anchor="middle" font-size="9" fill="#8b949e">← added at runtime</text>

  <!-- Legend -->
  <rect x="30" y="445" width="800" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="65" cy="467" r="5" fill="#388bfd"/><text x="76" y="471" font-size="11" fill="#8b949e">API communication</text>
  <circle cx="200" cy="467" r="5" fill="#3fb950"/><text x="211" y="471" font-size="11" fill="#8b949e">Registry (pull/push)</text>
  <circle cx="340" cy="467" r="5" fill="#d2a8ff"/><text x="351" y="471" font-size="11" fill="#8b949e">Runtime chain</text>
  <circle cx="460" cy="467" r="5" fill="#0d419d" stroke="#388bfd" stroke-width="1"/><text x="471" y="471" font-size="11" fill="#8b949e">Running container</text>
  <circle cx="590" cy="467" r="5" fill="#2d4739" stroke="#3fb950" stroke-width="1"/><text x="601" y="471" font-size="11" fill="#8b949e">Writable layer</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388bfd"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d2a8ff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffa657"/>
    </marker>
  </defs>
</svg>
